name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release, for example v0.1.2"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Read version
        id: version
        run: |
          version="$(node -p "require('./manifest.json').version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches manifest version
        env:
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          test "$TAG_NAME" = "v$VERSION"

      - name: Check JavaScript syntax
        run: |
          find src -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Check shell scripts
        run: |
          find scripts -name '*.sh' -print0 | xargs -0 -n1 sh -n

      - name: Build release packages
        run: |
          ./scripts/package.sh
          ./scripts/package-firefox.sh

      - name: Validate packages
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          unzip -t "dist/meerkat-$VERSION.zip"
          unzip -t "dist/meerkat-$VERSION-firefox.zip"

      - name: Write release notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cat > release-notes.md <<EOF
          ## Packages

          - Chrome / Chromium: \`meerkat-$VERSION.zip\`
          - Firefox: \`meerkat-$VERSION-firefox.zip\`

          The Firefox package is generated from the Chrome extension source with a Firefox-compatible background script manifest.
          EOF

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "$TAG_NAME" \
            "dist/meerkat-$VERSION.zip" \
            "dist/meerkat-$VERSION-firefox.zip" \
            --title "Meerkat $VERSION" \
            --notes-file release-notes.md \
            --verify-tag
